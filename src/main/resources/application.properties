# =============================================
# E-Commerce Platform - Application Properties
# =============================================

spring.application.name=ecommerce-platform

# --- Database (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Dialect removido: Hibernate 6 detecta automaticamente

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:MyVerySecretKeyForJWTTokenGenerationInEcommerceApp2024}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- Mail ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@ecommerce.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# --- OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Business Rules ---
app.business.stock.low-threshold=10
app.business.order.approval-threshold=200.00
app.business.order.max-items=50
app.business.discount.max-percent=80.0
app.business.return.days-allowed=30

# --- Logging ---
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- Mantém sessão JPA aberta durante requisição (evita LazyInitializationException) ---
spring.jpa.open-in-view=true
